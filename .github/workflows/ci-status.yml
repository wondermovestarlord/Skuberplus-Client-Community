# CI 결과에 따라 PR에 라벨 부착 + 코멘트
# CI 워크플로우 완료 후 트리거

name: CI Status

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  ci-status:
    name: Update PR Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            // workflow_run에서 PR 번호 추출
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', prs[0].number);

      - name: CI failed — add label and comment
        if: ${{ steps.pr.outputs.found == 'true' && github.event.workflow_run.conclusion == 'failure' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const runUrl = context.payload.workflow_run.html_url;

            // 라벨 추가
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['ci-failed'],
            });

            // 기존 봇 코멘트 확인 (중복 방지)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('CI checks failed')
            );

            const body = [
              '## ❌ CI checks failed',
              '',
              `[View workflow run](${runUrl}) for details.`,
              '',
              'Please fix the failing checks and push again.',
              'The `ci-failed` label will be removed automatically when CI passes.',
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: CI passed — remove label
        if: ${{ steps.pr.outputs.found == 'true' && github.event.workflow_run.conclusion == 'success' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);

            // ci-failed 라벨 제거 (없으면 무시)
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'ci-failed',
              });
            } catch (e) {
              // 라벨이 없으면 404 — 무시
            }
