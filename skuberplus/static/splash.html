<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      /* 🎯 기본 스타일 리셋 */
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }

      /* 🎯 배경: 스플래시 이미지로 전체 채움 */
      body {
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        /* 배경 이미지를 body에 직접 적용 */
        background-image: url('./images/apps/splash-bg.png');
        background-size: cover;
        background-position: center;
      }

      /* 🎯 스플래시 컨텐츠 컨테이너 (배경 없이 컨텐츠만) */
      .splash-modal {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 28px;
        width: 100%;
        height: 100%;
        justify-content: center;
      }

      /* 🎯 로고 + 브랜드명 그룹 */
      .brand-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      /* 🎯 로고 컨테이너 */
      .logo {
        width: 48px;
        height: 48px;
      }

      .logo svg {
        width: 48px;
        height: 48px;
      }

      /* 🎯 브랜드명: text-3xl font-light text-white */
      .brand-name {
        font-size: 1.875rem; /* 30px = text-3xl */
        line-height: 2.25rem; /* 36px */
        font-weight: 300; /* font-light */
        color: white;
        margin: 0;
      }

      /* 🎯 로딩 인디케이터 */
      .loading-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        width: 100%;
      }

      /* 🎯 회전 스피너 아이콘 */
      .spinner {
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* 🎯 로딩 텍스트 */
      .loading-text {
        font-size: 0.875rem; /* 14px = text-sm */
        line-height: 1;
        font-weight: 300; /* font-light */
        color: white;
        text-align: center;
      }
    </style>
  </head>
